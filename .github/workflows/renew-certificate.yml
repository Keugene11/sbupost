name: Renew iOS Certificate & Profile

on:
  workflow_dispatch:

jobs:
  renew:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate certificate and profile
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          npm install jsonwebtoken

          node << 'SCRIPT'
          const { execSync } = require('child_process');
          const crypto = require('crypto');
          const jwt = require('jsonwebtoken');
          const fs = require('fs');

          const run = (cmd) => execSync(cmd, { encoding: 'utf8' }).trim();
          const api = async (method, endpoint, body) => {
            const url = 'https://api.appstoreconnect.apple.com/v1' + endpoint;
            const opts = { method, headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(url, opts);
            const text = await res.text();
            if (!res.ok && method !== 'DELETE') console.error('API error:', res.status, text.slice(0, 300));
            try { return JSON.parse(text); } catch { return text; }
          };

          // 1. Generate JWT
          console.log('=== Generating JWT ===');
          const now = Math.floor(Date.now() / 1000);
          const TOKEN = jwt.sign(
            { iss: process.env.ASC_ISSUER_ID, iat: now, exp: now + 1200, aud: 'appstoreconnect-v1' },
            process.env.ASC_PRIVATE_KEY,
            { algorithm: 'ES256', header: { kid: process.env.ASC_KEY_ID } }
          );

          (async () => {
            // 2. Generate private key and CSR
            console.log('=== Generating key and CSR ===');
            run('openssl genrsa -out /tmp/dist.key 2048 2>/dev/null');
            run('openssl req -new -key /tmp/dist.key -out /tmp/dist.csr -subj "/CN=SBUPost Distribution/O=Keugene Lee/C=US"');
            const csrContent = fs.readFileSync('/tmp/dist.csr', 'utf8');

            // 3. Revoke old certificates
            console.log('=== Revoking old certificates ===');
            const existing = await api('GET', '/certificates?filter[certificateType]=DISTRIBUTION');
            for (const cert of (existing.data || [])) {
              console.log('Revoking:', cert.id);
              await api('DELETE', '/certificates/' + cert.id);
            }

            // 4. Create new certificate
            console.log('=== Creating new certificate ===');
            const certRes = await api('POST', '/certificates', {
              data: { type: 'certificates', attributes: { certificateType: 'DISTRIBUTION', csrContent: csrContent } }
            });
            if (!certRes.data) { console.error('Failed to create cert:', JSON.stringify(certRes).slice(0, 500)); process.exit(1); }
            const certId = certRes.data.id;
            const certContent = certRes.data.attributes.certificateContent;
            console.log('Certificate created:', certId);

            // 5. Create .p12
            console.log('=== Creating .p12 ===');
            fs.writeFileSync('/tmp/dist.cer', Buffer.from(certContent, 'base64'));
            const p12Pass = 'sbupost2026';
            run('openssl x509 -inform DER -in /tmp/dist.cer -out /tmp/dist.pem');
            run(`openssl pkcs12 -export -out /tmp/dist.p12 -inkey /tmp/dist.key -in /tmp/dist.pem -password pass:${p12Pass}`);
            const p12B64 = run('base64 -i /tmp/dist.p12 | tr -d "\\n"');

            // 6. Find bundle ID
            console.log('=== Finding bundle ID ===');
            const bundleRes = await api('GET', '/bundleIds?filter[identifier]=com.sbupost.app');
            if (!bundleRes.data?.length) { console.error('Bundle ID not found'); process.exit(1); }
            const bundleId = bundleRes.data[0].id;
            console.log('Bundle ID:', bundleId);

            // 7. Delete old profiles
            console.log('=== Cleaning old profiles ===');
            const oldProfiles = await api('GET', '/profiles?filter[profileType]=IOS_APP_STORE');
            for (const p of (oldProfiles.data || [])) {
              console.log('Deleting profile:', p.attributes.name, p.id);
              await api('DELETE', '/profiles/' + p.id);
            }

            // 8. Create new provisioning profile
            console.log('=== Creating provisioning profile ===');
            const profileRes = await api('POST', '/profiles', {
              data: {
                type: 'profiles',
                attributes: { name: 'SBUPost AppStore', profileType: 'IOS_APP_STORE' },
                relationships: {
                  bundleId: { data: { type: 'bundleIds', id: bundleId } },
                  certificates: { data: [{ type: 'certificates', id: certId }] }
                }
              }
            });
            if (!profileRes.data) { console.error('Failed to create profile:', JSON.stringify(profileRes).slice(0, 500)); process.exit(1); }
            const profileUUID = profileRes.data.attributes.uuid;
            const profileContent = profileRes.data.attributes.profileContent;
            console.log('Profile created:', profileUUID);

            // 9. Save profile to file for base64
            fs.writeFileSync('/tmp/profile.mobileprovision', Buffer.from(profileContent, 'base64'));
            const profileB64 = run('base64 -i /tmp/profile.mobileprovision | tr -d "\\n"');

            // 10. Update GitHub secrets
            console.log('=== Updating GitHub secrets ===');
            const repo = process.env.GITHUB_REPOSITORY;
            const gh = (name, value) => {
              execSync(`gh secret set ${name} --repo "${repo}"`, { input: value, encoding: 'utf8' });
              console.log('Updated secret:', name);
            };
            gh('DISTRIBUTION_CERTIFICATE_P12', p12B64);
            gh('DISTRIBUTION_CERTIFICATE_PASSWORD', p12Pass);
            gh('PROVISIONING_PROFILE', profileB64);
            gh('PROVISIONING_PROFILE_UUID', profileUUID);

            console.log('');
            console.log('=== DONE ===');
            console.log('Certificate ID:', certId);
            console.log('Profile UUID:', profileUUID);
          })().catch(e => { console.error(e); process.exit(1); });
          SCRIPT
