name: Update App Store Metadata

on:
  workflow_dispatch:

jobs:
  update-metadata:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update App Store Connect
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          node << 'SCRIPT'
          const crypto = require('crypto');
          const fs = require('fs');
          const path = require('path');

          const KEY_ID = process.env.KEY_ID;
          const ISSUER_ID = process.env.ISSUER_ID;
          const PRIVATE_KEY = process.env.PRIVATE_KEY;

          function generateJWT() {
            const now = Math.floor(Date.now() / 1000);
            const header = JSON.stringify({ alg: 'ES256', kid: KEY_ID, typ: 'JWT' });
            const payload = JSON.stringify({ iss: ISSUER_ID, iat: now, exp: now + 1200, aud: 'appstoreconnect-v1' });
            const b64 = s => Buffer.from(s).toString('base64url');
            const input = b64(header) + '.' + b64(payload);
            const sig = crypto.sign('SHA256', Buffer.from(input), { key: PRIVATE_KEY, dsaEncoding: 'ieee-p1363' });
            return input + '.' + sig.toString('base64url');
          }

          const TOKEN = generateJWT();

          async function api(method, endpoint, body) {
            const url = 'https://api.appstoreconnect.apple.com/v1' + endpoint;
            const opts = {
              method,
              headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
            };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(url, opts);
            const text = await res.text();
            try { return JSON.parse(text); } catch { return text; }
          }

          async function main() {
            // 1. Find app
            console.log('Finding app...');
            const apps = await api('GET', '/apps?filter[bundleId]=com.sbupost.app');
            if (!apps.data || apps.data.length === 0) {
              console.error('App not found:', JSON.stringify(apps).slice(0, 500));
              process.exit(1);
            }
            const appId = apps.data[0].id;
            console.log('App ID:', appId);

            // 2. Find or create version
            console.log('Finding version...');
            const versions = await api('GET', '/apps/' + appId + '/appStoreVersions?filter[appStoreState]=PREPARE_FOR_SUBMISSION,READY_FOR_SALE,WAITING_FOR_REVIEW,IN_REVIEW');
            let versionId;
            if (versions.data && versions.data.length > 0) {
              versionId = versions.data[0].id;
              console.log('Existing version:', versionId);
            } else {
              console.log('Creating version 1.0...');
              const newVer = await api('POST', '/appStoreVersions', {
                data: {
                  type: 'appStoreVersions',
                  attributes: { platform: 'IOS', versionString: '1.0' },
                  relationships: { app: { data: { type: 'apps', id: appId } } }
                }
              });
              versionId = newVer.data.id;
              console.log('Created version:', versionId);
            }

            // 3. Find or create localization
            console.log('Finding localization...');
            const locales = await api('GET', '/appStoreVersions/' + versionId + '/appStoreVersionLocalizations');
            let localeId;
            if (locales.data && locales.data.length > 0) {
              localeId = locales.data[0].id;
              console.log('Existing locale:', localeId);
            } else {
              const newLocale = await api('POST', '/appStoreVersionLocalizations', {
                data: {
                  type: 'appStoreVersionLocalizations',
                  attributes: { locale: 'en-US' },
                  relationships: { appStoreVersion: { data: { type: 'appStoreVersions', id: versionId } } }
                }
              });
              localeId = newLocale.data.id;
              console.log('Created locale:', localeId);
            }

            // 4. Update metadata
            console.log('Updating metadata...');
            const description = `SBUPost is the social network built exclusively for Stony Brook University students.

          Connect with fellow Seawolves, share what's happening on campus, and never miss a moment.

          • Share posts with text, photos, and videos
          • Follow classmates and see their updates
          • Direct message other students
          • Build your profile with your major, courses, clubs, and more
          • Search for students by name, major, or shared interests
          • Get notified when someone likes, comments, or follows you

          Whether you're looking for study partners, want to know what's going on around campus, or just want to connect with other Stony Brook students — SBUPost is your go-to app.

          Note: SBUPost requires a Stony Brook University email (@stonybrook.edu) to sign up.`;

            const metaResult = await api('PATCH', '/appStoreVersionLocalizations/' + localeId, {
              data: {
                type: 'appStoreVersionLocalizations',
                id: localeId,
                attributes: {
                  description,
                  keywords: 'stony brook,sbu,university,college,social,campus,students,seawolves,connect,friends',
                  supportUrl: 'https://sbupost.vercel.app/privacy',
                  marketingUrl: 'https://sbupost.vercel.app',
                  // whatsNew only for updates, not initial release
                }
              }
            });
            console.log('Metadata updated:', metaResult.data ? 'success' : JSON.stringify(metaResult).slice(0, 300));

            // 5. Set category
            console.log('Setting category...');
            const appInfos = await api('GET', '/apps/' + appId + '/appInfos');
            if (appInfos.data && appInfos.data.length > 0) {
              const appInfoId = appInfos.data[0].id;
              const catResult = await api('PATCH', '/appInfos/' + appInfoId, {
                data: {
                  type: 'appInfos',
                  id: appInfoId,
                  relationships: {
                    primaryCategory: { data: { type: 'appCategories', id: 'SOCIAL_NETWORKING' } }
                  }
                }
              });
              console.log('Category set:', catResult.data ? 'success' : JSON.stringify(catResult).slice(0, 300));
            }

            // 6. Upload screenshots
            console.log('Uploading screenshots...');
            const displayTypes = [
              { type: 'APP_IPHONE_67', prefix: '67' },
              { type: 'APP_IPHONE_65', prefix: '65' },
            ];

            for (const { type: displayType, prefix } of displayTypes) {
              // Get or create screenshot set
              const sets = await api('GET', '/appStoreVersionLocalizations/' + localeId + '/appScreenshotSets');
              let setId;
              if (sets.data) {
                const existing = sets.data.find(s => s.attributes.screenshotDisplayType === displayType);
                if (existing) setId = existing.id;
              }

              if (!setId) {
                console.log('Creating screenshot set for', displayType);
                const newSet = await api('POST', '/appScreenshotSets', {
                  data: {
                    type: 'appScreenshotSets',
                    attributes: { screenshotDisplayType: displayType },
                    relationships: { appStoreVersionLocalization: { data: { type: 'appStoreVersionLocalizations', id: localeId } } }
                  }
                });
                setId = newSet.data?.id;
                if (!setId) {
                  console.log('Failed to create set:', JSON.stringify(newSet).slice(0, 300));
                  continue;
                }
              }

              console.log(displayType, 'set ID:', setId);

              // Check existing screenshots
              const existingScreenshots = await api('GET', '/appScreenshotSets/' + setId + '/appScreenshots');
              if (existingScreenshots.data && existingScreenshots.data.length > 0) {
                console.log(displayType, 'already has', existingScreenshots.data.length, 'screenshots, skipping');
                continue;
              }

              // Upload each screenshot
              for (let i = 1; i <= 4; i++) {
                const filePath = path.join('public', 'screenshots', prefix + '_' + i + '.png');
                if (!fs.existsSync(filePath)) { console.log('File not found:', filePath); continue; }

                const fileData = fs.readFileSync(filePath);
                const fileSize = fileData.length;
                const checksum = crypto.createHash('md5').update(fileData).digest('base64');

                console.log('Reserving upload for', filePath, '(' + fileSize + ' bytes)');

                const reserve = await api('POST', '/appScreenshots', {
                  data: {
                    type: 'appScreenshots',
                    attributes: { fileName: prefix + '_' + i + '.png', fileSize, sourceFileChecksum: checksum },
                    relationships: { appScreenshotSet: { data: { type: 'appScreenshotSets', id: setId } } }
                  }
                });

                if (!reserve.data) {
                  console.log('Reserve failed:', JSON.stringify(reserve).slice(0, 300));
                  continue;
                }

                const screenshotId = reserve.data.id;
                const ops = reserve.data.attributes.uploadOperations || [];

                for (const op of ops) {
                  const headers = {};
                  for (const h of op.requestHeaders || []) headers[h.name] = h.value;

                  const chunk = fileData.subarray(op.offset, op.offset + op.length);
                  await fetch(op.url, { method: 'PUT', headers, body: chunk });
                }

                // Commit
                await api('PATCH', '/appScreenshots/' + screenshotId, {
                  data: {
                    type: 'appScreenshots',
                    id: screenshotId,
                    attributes: { uploaded: true, sourceFileChecksum: checksum }
                  }
                });
                console.log('Uploaded', filePath);
              }
            }

            // 7. Set age rating (all NONE — social app with no objectionable content)
            console.log('Setting age rating...');
            const appInfos2 = await api('GET', '/apps/' + appId + '/appInfos');
            if (appInfos2.data && appInfos2.data.length > 0) {
              const appInfoId = appInfos2.data[0].id;
              // Get age rating declaration
              const ageRatingDecl = await api('GET', '/appInfos/' + appInfoId + '/ageRatingDeclaration');
              if (ageRatingDecl.data) {
                const ageId = ageRatingDecl.data.id;
                const ageResult = await api('PATCH', '/ageRatingDeclarations/' + ageId, {
                  data: {
                    type: 'ageRatingDeclarations',
                    id: ageId,
                    attributes: {
                      alcoholTobaccoOrDrugUseOrReferences: 'NONE',
                      contests: 'NONE',
                      gambling: false,
                      gamblingSimulated: 'NONE',
                      horrorOrFearThemes: 'NONE',
                      matureOrSuggestiveThemes: 'NONE',
                      medicalOrTreatmentInformation: 'NONE',
                      profanityOrCrudeHumor: 'NONE',
                      sexualContentGraphicAndNudity: 'NONE',
                      sexualContentOrNudity: 'NONE',
                      violenceCartoonOrFantasy: 'NONE',
                      violenceRealistic: 'NONE',
                      violenceRealisticProlongedGraphicOrSadistic: 'NONE',
                      unrestrictedWebAccess: false
                    }
                  }
                });
                console.log('Age rating set:', ageResult.data ? 'success' : JSON.stringify(ageResult).slice(0, 300));
              }
            }

            // 8. Set pricing to Free
            console.log('Setting pricing to Free...');
            // Check if there's already a price schedule
            const priceResult = await api('GET', '/apps/' + appId + '/appPriceSchedule');
            if (priceResult.data) {
              console.log('Price schedule already exists');
            } else {
              // For new apps, we set it via appPriceSchedule
              const setPriceResult = await api('POST', '/appPriceSchedules', {
                data: {
                  type: 'appPriceSchedules',
                  relationships: {
                    app: { data: { type: 'apps', id: appId } },
                    manualPrices: { data: [{ type: 'appPrices', id: '${price_point_free}' }] },
                    baseTerritory: { data: { type: 'territories', id: 'USA' } }
                  }
                }
              });
              console.log('Price set:', setPriceResult.data ? 'success' : JSON.stringify(setPriceResult).slice(0, 300));
            }

            // 9. Select latest build
            console.log('Selecting build...');
            const builds = await api('GET', '/builds?filter[app]=' + appId + '&filter[processingState]=VALID&sort=-uploadedDate&limit=1');
            if (builds.data && builds.data.length > 0) {
              const buildId = builds.data[0].id;
              console.log('Latest build:', buildId);
              const buildResult = await api('PATCH', '/appStoreVersions/' + versionId, {
                data: {
                  type: 'appStoreVersions',
                  id: versionId,
                  relationships: {
                    build: { data: { type: 'builds', id: buildId } }
                  }
                }
              });
              console.log('Build selected:', buildResult.data ? 'success' : JSON.stringify(buildResult).slice(0, 300));
            } else {
              console.log('No valid builds found. Builds response:', JSON.stringify(builds).slice(0, 300));
            }

            // 10. Set export compliance (no encryption beyond standard HTTPS)
            console.log('Setting export compliance...');
            const buildDetail = await api('GET', '/builds/' + builds.data[0].id + '/appEncryptionDeclaration');
            if (!buildDetail.data) {
              // Create encryption declaration
              const encResult = await api('POST', '/appEncryptionDeclarations', {
                data: {
                  type: 'appEncryptionDeclarations',
                  attributes: {
                    usesEncryption: false
                  },
                  relationships: {
                    app: { data: { type: 'apps', id: appId } }
                  }
                }
              });
              if (encResult.data) {
                // Link to build
                await api('POST', '/builds/' + builds.data[0].id + '/relationships/appEncryptionDeclaration', {
                  data: { type: 'appEncryptionDeclarations', id: encResult.data.id }
                });
                console.log('Export compliance set');
              } else {
                console.log('Encryption declaration:', JSON.stringify(encResult).slice(0, 300));
                // Try alternative: set usesNonExemptEncryption on the build
              }
            } else {
              console.log('Export compliance already set');
            }

            // Try setting usesNonExemptEncryption directly on build
            const setBuildEnc = await api('PATCH', '/builds/' + builds.data[0].id, {
              data: {
                type: 'builds',
                id: builds.data[0].id,
                attributes: {
                  usesNonExemptEncryption: false
                }
              }
            });
            console.log('Build encryption:', setBuildEnc.data ? 'success' : JSON.stringify(setBuildEnc).slice(0, 300));

            // 11. Check what's blocking submission
            console.log('Checking submission readiness...');
            // Check the appStoreReviewDetail
            const reviewDetail = await api('GET', '/appStoreVersions/' + versionId + '/appStoreReviewDetail');
            console.log('Review detail:', JSON.stringify(reviewDetail).slice(0, 500));

            // If no review detail exists, create one with contact info
            if (!reviewDetail.data) {
              const createReviewDetail = await api('POST', '/appStoreReviewDetails', {
                data: {
                  type: 'appStoreReviewDetails',
                  attributes: {
                    contactFirstName: 'Keugene',
                    contactLastName: 'Lee',
                    contactEmail: 'keugenelee11@gmail.com',
                    contactPhone: '+16310000000',
                    notes: 'SBUPost is a social networking app for Stony Brook University students. To test, you can sign up with any email or use Google Sign In.'
                  },
                  relationships: {
                    appStoreVersion: { data: { type: 'appStoreVersions', id: versionId } }
                  }
                }
              });
              console.log('Review detail created:', createReviewDetail.data ? 'success' : JSON.stringify(createReviewDetail).slice(0, 300));
            }

            // Check content rights
            const appInfo = await api('GET', '/apps/' + appId + '/appInfos');
            if (appInfo.data && appInfo.data.length > 0) {
              const infoId = appInfo.data[0].id;
              const infoLocales = await api('GET', '/appInfos/' + infoId + '/appInfoLocalizations');
              console.log('App info locales:', JSON.stringify(infoLocales.data?.map(d => d.attributes) || []).slice(0, 500));

              // Check if privacy URL is set on app info
              if (infoLocales.data && infoLocales.data.length > 0) {
                const infoLocaleId = infoLocales.data[0].id;
                const updateInfoLocale = await api('PATCH', '/appInfoLocalizations/' + infoLocaleId, {
                  data: {
                    type: 'appInfoLocalizations',
                    id: infoLocaleId,
                    attributes: {
                      privacyPolicyUrl: 'https://sbupost.vercel.app/privacy'
                    }
                  }
                });
                console.log('Privacy URL set:', updateInfoLocale.data ? 'success' : JSON.stringify(updateInfoLocale).slice(0, 300));
              }
            }

            console.log('Submitting for review...');
            // First try the newer reviewSubmissions endpoint
            // Step 1: Create review submission
            let submitResult = await api('POST', '/reviewSubmissions', {
              data: {
                type: 'reviewSubmissions',
                relationships: {
                  app: { data: { type: 'apps', id: appId } }
                }
              }
            });

            if (submitResult.data) {
              const submissionId = submitResult.data.id;
              console.log('Review submission created:', submissionId);

              // Step 2: Add the version as a review submission item
              const itemResult = await api('POST', '/reviewSubmissionItems', {
                data: {
                  type: 'reviewSubmissionItems',
                  relationships: {
                    appStoreVersion: { data: { type: 'appStoreVersions', id: versionId } },
                    reviewSubmission: { data: { type: 'reviewSubmissions', id: submissionId } }
                  }
                }
              });
              console.log('Review item added:', itemResult.data ? 'success' : JSON.stringify(itemResult).slice(0, 300));

              // Step 3: Confirm submission
              const confirmResult = await api('PATCH', '/reviewSubmissions/' + submissionId, {
                data: {
                  type: 'reviewSubmissions',
                  id: submissionId,
                  attributes: { submitted: true }
                }
              });
              console.log('Submit result:', confirmResult.data ? 'SUBMITTED FOR REVIEW!' : JSON.stringify(confirmResult).slice(0, 500));
            } else {
              console.log('Review submission response:', JSON.stringify(submitResult).slice(0, 500));
            }

            console.log('Done! App is submitted for App Store review.');
          }

          main().catch(e => { console.error(e); process.exit(1); });
          SCRIPT
