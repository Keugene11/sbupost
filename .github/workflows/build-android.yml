name: Build Android App

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Create web assets directory
        run: |
          mkdir -p out
          cat > out/index.html << 'FALLBACK'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>SBUPost</title>
            <style>
              body { margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #fafafa; font-family: -apple-system, sans-serif; }
              .loader { text-align: center; }
              .spinner { width: 24px; height: 24px; border: 2px solid #e8e8e8; border-top-color: #1a1a1a; border-radius: 50%; animation: spin 0.6s linear infinite; margin: 0 auto 12px; }
              @keyframes spin { to { transform: rotate(360deg); } }
              p { color: #999; font-size: 14px; }
            </style>
            <script>
              setTimeout(function() {
                window.location.href = 'https://sbupost.vercel.app/feed';
              }, 1000);
            </script>
          </head>
          <body>
            <div class="loader">
              <div class="spinner"></div>
              <p>Loading SBUPost...</p>
            </div>
          </body>
          </html>
          FALLBACK

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android platform
        run: npx cap add android

      - name: Create assets directory
        run: mkdir -p android/app/src/main/assets/public

      - name: Set version code
        run: |
          cd android/app
          VERSION_CODE=${{ github.run_number }}
          sed -i "s/versionCode [0-9]*/versionCode ${VERSION_CODE}/" build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"1.0.${VERSION_CODE}\"/" build.gradle

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Sign and build AAB
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: android/app/build/outputs/bundle/release/*.aab
