name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Create web assets directory
        run: mkdir -p out && echo '<html><body>Loading...</body></html>' > out/index.html

      - name: Add iOS platform
        run: npx cap add ios

      - name: Create assets directory
        run: mkdir -p ios/App/App/public

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build iOS (unsigned)
        run: |
          cd ios/App
          # Use xcworkspace if it exists, otherwise xcodeproj
          if [ -d "App.xcworkspace" ]; then
            PROJ_FLAG="-workspace App.xcworkspace"
          else
            PROJ_FLAG="-project App.xcodeproj"
          fi
          xcodebuild $PROJ_FLAG \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload iOS archive
        uses: actions/upload-artifact@v4
        with:
          name: ios-archive
          path: ${{ runner.temp }}/App.xcarchive
