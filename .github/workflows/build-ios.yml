name: Build & Upload iOS App

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Create web assets directory
        run: |
          mkdir -p out
          cat > out/index.html << 'FALLBACK'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>SBUPost</title>
            <style>
              body { margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #fafafa; font-family: -apple-system, sans-serif; }
              .loader { text-align: center; }
              .spinner { width: 24px; height: 24px; border: 2px solid #e8e8e8; border-top-color: #1a1a1a; border-radius: 50%; animation: spin 0.6s linear infinite; margin: 0 auto 12px; }
              @keyframes spin { to { transform: rotate(360deg); } }
              p { color: #999; font-size: 14px; }
            </style>
            <script>
              // Redirect to the server URL if loaded locally
              setTimeout(function() {
                window.location.href = 'https://sbupost.vercel.app/feed';
              }, 1000);
            </script>
          </head>
          <body>
            <div class="loader">
              <div class="spinner"></div>
              <p>Loading SBUPost...</p>
            </div>
          </body>
          </html>
          FALLBACK

      - name: Add iOS platform
        run: npx cap add ios

      - name: Sync Capacitor
        run: |
          mkdir -p ios/App/App/public
          npx cap sync ios

      - name: Install signing certificate
        env:
          P12_BASE64: ${{ secrets.DISTRIBUTION_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
        run: |
          # Decode P12
          echo "$P12_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12

          # Create temporary keychain
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          # Import certificate
          security import $RUNNER_TEMP/cert.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE }}
          PROFILE_UUID: ${{ secrets.PROVISIONING_PROFILE_UUID }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision

      - name: Update Xcode project
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_UUID: ${{ secrets.PROVISIONING_PROFILE_UUID }}
        run: |
          cd ios/App
          sed -i '' 's/com\.getcapacitor\.myapp/com.sbupost.app/g' App.xcodeproj/project.pbxproj
          sed -i '' "s/DEVELOPMENT_TEAM = \"\"/DEVELOPMENT_TEAM = ${APPLE_TEAM_ID}/g" App.xcodeproj/project.pbxproj
          sed -i '' "s/DEVELOPMENT_TEAM = .*;/DEVELOPMENT_TEAM = ${APPLE_TEAM_ID};/g" App.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' App.xcodeproj/project.pbxproj

          # Add camera, photo library, and microphone permissions
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'SBUPost needs camera access to take photos for posts and your profile'" App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'SBUPost needs photo library access to share photos in posts'" App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'SBUPost needs microphone access to record videos'" App/Info.plist || true

          # Bump build number using run number to ensure uniqueness
          BUILD_NUMBER=${{ github.run_number }}
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${BUILD_NUMBER}" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.${BUILD_NUMBER}" App/Info.plist

      - name: Archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_UUID: ${{ secrets.PROVISIONING_PROFILE_UUID }}
        run: |
          cd ios/App
          if [ -d "App.xcworkspace" ]; then PROJ="-workspace App.xcworkspace"; else PROJ="-project App.xcodeproj"; fi
          xcodebuild $PROJ \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            archive \
            DEVELOPMENT_TEAM=$APPLE_TEAM_ID \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PRODUCT_BUNDLE_IDENTIFIER=com.sbupost.app \
            PROVISIONING_PROFILE_SPECIFIER="" \
            PROVISIONING_PROFILE=$PROFILE_UUID

      - name: Export IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_UUID: ${{ secrets.PROVISIONING_PROFILE_UUID }}
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>${APPLE_TEAM_ID}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.sbupost.app</key>
                  <string>${PROFILE_UUID}</string>
              </dict>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          mkdir -p ~/private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

          xcrun altool --upload-app \
            -f $RUNNER_TEMP/export/App.ipa \
            -t ios \
            --apiKey $APP_STORE_CONNECT_KEY_ID \
            --apiIssuer $APP_STORE_CONNECT_ISSUER_ID

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-ipa
          path: ${{ runner.temp }}/export/
